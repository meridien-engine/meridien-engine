services:
  # ── Data Stores ─────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: meridien_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meridien_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application ──────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meridien_backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      PORT: 8080
      OTLP_ENDPOINT: otel-collector:4317
      HITL_TIMEOUT_HOURS: 24
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./backend

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: meridien_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    container_name: meridien_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: meridien
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo

  # ── Distributed Tracing ───────────────────────────────────────────────────────

  # OTEL Collector: receives spans from Mera agent nodes (gRPC port 4317),
  # and forwards them to Tempo for storage.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: meridien_otel_collector
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./infra/otel/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — Mera connects here
      - "4318:4318"   # OTLP HTTP — optional
      - "8889:8889"   # Prometheus exporter (collector self-metrics)
    depends_on:
      - tempo

  # Tempo: stores and indexes distributed traces ingested by the OTEL Collector.
  tempo:
    image: grafana/tempo:2.5.0
    container_name: meridien_tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Grafana Tempo query API
      - "9095:9095"   # Tempo gRPC (internal)

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  tempo_data:
